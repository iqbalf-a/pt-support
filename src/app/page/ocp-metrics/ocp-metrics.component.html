<main class="pl-8">
    <p class="text-sm text-gray-500">OCP Metrics</p>
    <div class="flex justify-center mt-4">
        <div class="flex-col w-2/3">
            <div class="flex flex-col justify-center">
                <p class="text-sm font-semibold">Input OCP Metrics JSON</p>
                <textarea class="mt-2 font-mono text-sm border w-full h-64 p-4 rounded-lg resize" placeholder="enter text..." [(ngModel)]="inputText"></textarea>
            </div>
            <div class="flex flex-col justify-center items-center mt-4">
                <div class="flex">
                    <input type="checkbox" id="each-line" class="mr-2" [(ngModel)]="isChecked" />
                    <label for="each-line" class="text-sm">show pod name</label>
                </div>
                <button class="text-sm bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 w-48 rounded-lg focus:outline-none focus:shadow-outline mt-4" (click)="processMetrics()">Proccess Data</button>
            </div>
            <div class="flex flex-col justify-center mt-4">
                <p class="text-sm font-semibold">Output</p>
                <textarea class="mt-2 text-sm font-mono border w-full p-4 rounded-lg h-64 resize" [value]="outputText" disabled></textarea>
            </div>
        </div>
    </div>
    <div class="mt-4 flex items-center flex-col">
        <button id="btn-copy-value"
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 w-48 rounded-lg focus:outline-none focus:shadow-outline mt-4"
            (click)="copyOutputTextToClipboard()">Copy Text</button>
    </div>
    <div *ngIf="showAlert" class="mt-14 top-0 left-0 w-full fixed bg-green-500 text-white text-center py-2">
        <p>Copied to clipboard!</p>
    </div>
</main>
